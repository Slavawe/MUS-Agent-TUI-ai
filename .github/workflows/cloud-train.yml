name: Cloud Training Pipeline

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'Training config size'
        required: true
        default: '400m'
        type: choice
        options:
          - '400m'
          - '700m'
      target:
        description: 'Cloud target'
        required: true
        default: 'kaggle'
        type: choice
        options:
          - kaggle
          - colab
  schedule:
    # Weekly automated training (Sunday 00:00 UTC)
    - cron: '0 0 * * 0'

jobs:
  generate-notebook:
    name: Generate cloud notebook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare notebook
        run: |
          CONFIG="${{ inputs.config || '400m' }}"
          echo "Preparing training config: ${CONFIG}"
          cat <<'NOTEBOOK' > cloud_training.ipynb
          {
           "cells": [
            {
             "cell_type": "markdown",
             "source": ["# МУС Cloud Training\n", "Auto-generated by GitHub Actions"],
             "metadata": {}
            },
            {
             "cell_type": "code",
             "source": [
              "CONFIG = '${CONFIG}'\n",
              "REPO = 'https://github.com/Slavawe/MUS-AI_platform.git'"
             ],
             "outputs": [],
             "execution_count": null,
             "metadata": {}
            }
           ],
           "metadata": {"kernelspec": {"display_name": "Python 3", "language": "python", "name": "python3"}}
          }
NOTEBOOK
          # Upload notebook as artifact for download
          mkdir -p artifacts

      - name: Upload training notebook
        uses: actions/upload-artifact@v4
        with:
          name: mus-cloud-training-${{ inputs.config || '400m' }}
          path: |
            mus-cuda/scripts/kaggle_pipeline.sh
            mus-cuda/scripts/colab_pipeline.sh
            mus-cuda/scripts/upload_to_hf.py
          retention-days: 30

      - name: Generate instructions
        run: |
          echo "## 🚀 Cloud Training Instructions" > artifacts/INSTRUCTIONS.md
          echo "" >> artifacts/INSTRUCTIONS.md
          echo "### Kaggle" >> artifacts/INSTRUCTIONS.md
          echo '1. Go to https://www.kaggle.com/code' >> artifacts/INSTRUCTIONS.md
          echo "2. Create a new Notebook (GPU Accelerator: T4 x2)" >> artifacts/INSTRUCTIONS.md
          echo '3. Run: `!pip install huggingface_hub`' >> artifacts/INSTRUCTIONS.md
          echo '4. Run: `!git clone https://github.com/Slavawe/MUS-AI_platform.git`' >> artifacts/INSTRUCTIONS.md
          echo '5. Run: `!bash mus-cuda/scripts/kaggle_pipeline.sh YOUR_HF_TOKEN`' >> artifacts/INSTRUCTIONS.md
          echo "" >> artifacts/INSTRUCTIONS.md
          echo "### Google Colab" >> artifacts/INSTRUCTIONS.md
          echo '1. Go to https://colab.research.google.com' >> artifacts/INSTRUCTIONS.md
          echo "2. Runtime → Change runtime type → GPU (T4)" >> artifacts/INSTRUCTIONS.md
          echo '3. Run: `!git clone https://github.com/Slavawe/MUS-AI_platform.git`' >> artifacts/INSTRUCTIONS.md
          echo '4. Run: `!bash mus-cuda/scripts/colab_pipeline.sh YOUR_HF_TOKEN`' >> artifacts/INSTRUCTIONS.md

      - name: Upload instructions
        uses: actions/upload-artifact@v4
        with:
          name: training-instructions
          path: artifacts/
          retention-days: 30
